Version=1.8.0.1346
NewFeature=1
BigBugFixed=1
BetaVersion=0

Comment=+ 支持 RAD Studio 13.1。\n+ 语言菜单增加 Delphi / C++Buidler / RAD Studio 的界面汉化功能。\n+ AI 辅助编码工具增加小米 MiMo 的支持。\n+ 注释整理专家增加对齐注释块的功能。\n+ 调试扩展专家增加对整型变量的增强显示。\n+ 窗体设计专家增加保存锁定状态的菜单项。\n* F2 改名功能的输入框增加 Ctrl+A 全选的机制。\n* 设置对话框增加配置所有快捷键的功能按钮。\n* 调试信息查看器搜索时在多个查看窗口中同步搜索的历史记录。\n* 安装包内增加杂凑命令行 CnHash 并将各文件杂凑值打包。\n* 其他错误修正与改进。

Comment_CHT=+ 支持 RAD Studio 13.1。\n+ 語言菜單增加 Delphi / C++Buidler / RAD Studio 的界面漢化功能。\n+ AI 輔助編碼工具增加小米 MiMo 的支持。\n+ 註釋整理專家增加對齊註釋塊的功能。\n+ 調試擴展專家增加對整型變量的增強顯示。\n+ 窗體設計專家增加保存鎖定狀態的菜單項。\n* F2 改名功能的輸入框增加 Ctrl+A 全選的機制。\n* 設置對話框增加配置所有快捷鍵的功能按鈕。\n* 調試信息查看器搜索時在多個查看窗口中同步搜索的歷史記錄。\n* 安裝包內增加雜湊命令行 CnHash 並將各文件雜湊值打包。\n* 其他錯誤修正與改進。

Comment_ENU=+ Supports RAD Studio 13.1.\n+ Add Delphi / C++Builder / RAD Studio IDE Chinese Localization in Language Menu.\n+ AI Coder Supports XiaoMi MiMo.\n+ Add Align Comment Block Menu in Comment Tidy.\n+ Add Integer Hex Display while Debugging in Debug Enhancement.\n+ Add Save Lock State Menu in Form Design Wizard.\n* Add Ctrl+A Select All in F2 Rename Input.\n* Add Configure All Shortcuts Button in Setting Dialog.\n* Sync Search History across Multiple Windows in Debug Inspector.\n* Add CnHash Command Line Tool and Package File Hashes.\n* Other Bugs Fixed.


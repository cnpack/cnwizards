<p class="title">跳至前一書籤工具</p>
<p class="text" align="left">
當當前編輯的原始檔案中存在書籤時，此功能可跳至當前光標前最近的一個書籤，如之前無書籤，則回繞至檔案尾部繼續尋找上一個書籤。</p>
